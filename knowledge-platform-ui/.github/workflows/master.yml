name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_ENV: production
  IMAGE_NAME: knowledge-platform-ui

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: |
          if npm run | grep -q '^  lint'; then
            npm run lint
          else
            echo 'No lint script configured.'
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      TEST_ENV: jest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: |
          if npm run | grep -q '^  test'; then
            npm test
          elif npx --no-install jest --version >/dev/null 2>&1; then
            npx jest --runInBand
          else
            echo 'No test script or Jest dependency configured. Skipping tests.'
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      BUILD_ENV: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  docker-latest:
    name: Docker Build (latest)
    runs-on: ubuntu-latest
    needs: build
    env:
      DOCKER_TAG: latest
      IMAGE_TAG: ${{ env.IMAGE_NAME }}:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_TAG }}

  docker-int:
    name: Docker Build (INT)
    runs-on: ubuntu-latest
    needs: build
    env:
      STAGE: INT
      IMAGE_TAG: ${{ env.IMAGE_NAME }}:int
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for INT
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_TAG }}

  docker-uat:
    name: Docker Build (UAT)
    runs-on: ubuntu-latest
    needs: build
    env:
      STAGE: UAT
      IMAGE_TAG: ${{ env.IMAGE_NAME }}:uat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for UAT
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_TAG }}

  docker-prod:
    name: Docker Build (PROD)
    runs-on: ubuntu-latest
    needs: build
    env:
      STAGE: PROD
      IMAGE_TAG: ${{ env.IMAGE_NAME }}:prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for PROD
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_TAG }}
